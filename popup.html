<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>TruthEye</title>
    <style>
        body {
            margin: 0;
            padding: 16px 18px 14px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 14px;
            background: #ffffff;
            color: #000000;
            min-width: 220px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .logo-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            margin-bottom: 6px;
        }

        .logo {
            width: 56px;
            height: 56px;
            border-radius: 18px;
            background: radial-gradient(circle at 30% 20%, #fde68a, #b45309);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.55);
        }

        .logo img {
            width: 34px;
            height: 34px;
        }

        .logo-title {
            font-size: 13px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #000000;
        }

        .button-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .text-button {
            width: 100%;
            padding: 9px 10px;
            border-radius: 10px;
            border: 1px solid #9ca3af;
            background: #ffffff;
            color: #000000;
            text-align: left;
            cursor: pointer;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            transition:
                    background 0.15s ease,
                    border-color 0.15s ease,
                    transform 0.08s ease;
        }

        .text-button span {
            font-size: 13px;
            font-weight: 500;
        }

        .text-button small {
            font-size: 11px;
            color: #9ca3af;
        }

        .text-button:hover {
            background: rgba(30, 64, 175, 0.75);
            border-color: rgba(129, 140, 248, 0.9);
            transform: translateY(-1px);
        }

        .text-button:active {
            transform: translateY(0);
            background: rgba(30, 64, 175, 0.9);
        }

        .chevron {
            font-size: 14px;
            opacity: 0.75;
        }

        .button-main-text {
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 로고 영역 -->
    <div class="logo-wrap">
        <div class="logo">
            <!-- ✅ 아이콘 경로: 현재 프로젝트 기준으로 맞춰줌 -->
            <img src="asset/icon128.png" alt="TruthEye Logo" />
        </div>
        <div class="logo-title">TRUTHEYE</div>
    </div>

    <!-- 버튼 영역 -->
    <div class="button-group">
        <button class="text-button" id="logButton">
            <div class="button-main-text">
                <span>진위여부 확인 로그</span>
                <small>최근 검증 내역을 확인합니다</small>
            </div>
            <span class="chevron">›</span>
        </button>

        <button class="text-button" id="bugButton">
            <div class="button-main-text">
                <span>버그 신고</span>
                <small>이상 동작이나 오류를 제보합니다</small>
            </div>
            <span class="chevron">›</span>
        </button>

        <button class="text-button" id="settingsButton">
            <div class="button-main-text">
                <span>환경설정</span>
                <small>AI 설정 및 동작 방식을 관리합니다</small>
            </div>
            <span class="chevron">›</span>
        </button>
        <button class="text-button" id="sideButton">
            <div class="button-main-text">
                <span>사이드패널 열기</span>
                <small>웹페이지에서 바로 진위여부를 확인합니다</small>
            </div>
            <span class="chevron">›</span>
        </button>
    </div>
</div>

<script src="popup.js"></script>
</body>
</html>
