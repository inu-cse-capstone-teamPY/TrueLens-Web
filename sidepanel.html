<!-- sidepanel.html -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Truth Checker</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            padding: 12px;
            font-size: 14px;
        }
        .status {
            margin-bottom: 8px;
            font-weight: 600;
        }
        .text {
            padding: 8px;
            border-radius: 6px;
            background: #f3f4f6;
            margin-bottom: 12px;
            white-space: pre-wrap;
            max-height: 160px;
            overflow-y: auto;
        }
        #result {
            border-top: 1px solid #e5e7eb;
            padding-top: 8px;
            min-height: 80px;
        }
    </style>
</head>
<body>
<div class="status" id="status">아직 분석된 텍스트가 없습니다.</div>
<div class="text" id="selectedText"></div>  <!-- ✅ 상단: 선택 텍스트 -->
<div id="result"></div>                     <!-- ✅ 하단: 진위 결과(나중용) -->

<script src="sidepanel.js"></script>
</body>
</html>
